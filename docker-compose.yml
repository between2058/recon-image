version: "3.8"

# =============================================================================
# ReconViaGen API — Docker Compose
#
# Machine-specific config lives in .env (gitignored).
# Copy .env.example → .env and set HF_CACHE_PATH before first run.
#
# Quick start:
#   cp .env.example .env        # first time on a new machine
#   $EDITOR .env                # set HF_CACHE_PATH
#   docker compose up -d
#
# Rebuild after code changes:
#   docker compose up -d --build
#
# Logs:
#   docker compose logs -f reconviagen
#   tail -f logs/app.log
#
# Check GPU inside container:
#   docker compose exec reconviagen nvidia-smi
# =============================================================================

services:
  reconviagen:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # sm_120 = RTX Pro 6000 (Blackwell).
        TORCH_CUDA_ARCH_LIST: "12.0"
        # Parallel compile jobs — increase if build machine has many cores.
        MAX_JOBS: "4"
        # Corporate proxy — required for apt-get, pip, git during build.
        http_proxy: "http://proxy.intra:80"
        https_proxy: "http://proxy.intra:80"
        no_proxy: "localhost,127.0.0.1"

    image: reconviagen:latest
    container_name: reconviagen-api

    ports:
      - "52069:52069"

    volumes:
      # ── HuggingFace model cache ───────────────────────────────────────────
      # Host path comes from .env (HF_CACHE_PATH); always mounted at
      # /app/hf_cache inside the container so env vars never need to change.
      - ${HF_CACHE_PATH}:/app/hf_cache:rw

      # ── Log persistence ───────────────────────────────────────────────────
      # Persists app.log / access.log / uvicorn.log on the host.
      # Logs survive container restarts and are rotated daily (14-day retention).
      - ./logs:/app/logs

      # ── Optional: expose generated 3D outputs to the host ────────────────
      # Uncomment to access .glb / .ply / .mp4 files directly on the host.
      # - ./outputs:/app/outputs

    environment:
      - SPCONV_ALGO=native
      # HuggingFace will look here first before downloading anything.
      # Container-side path is fixed; only the host path varies (see .env).
      - HF_HOME=/app/hf_cache
      - TRANSFORMERS_CACHE=/app/hf_cache
      - HUGGINGFACE_HUB_CACHE=/app/hf_cache
      # Optional: set a Hugging Face token if the model repo is gated
      # - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # Use "all" to expose every GPU, or specify device IDs:
              #   device_ids: ["0"]
              count: 1
              capabilities: [gpu]

    # Shared memory for PyTorch multiprocessing / DataLoader workers.
    # 8 GB is a safe default; reduce to 2 GB on memory-constrained hosts.
    shm_size: "8gb"

    restart: unless-stopped

    # Resource limits (optional — uncomment to enforce)
    # mem_limit: 32g
    # memswap_limit: 32g
